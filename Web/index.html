<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Desktop Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="sidebar">
        <h2>Agent Console</h2>
        <div class="config-section">
            <label>Provider</label>
            <select id="provider-select">
                <option value="ollama">Ollama (Local VL)</option>
                <option value="openrouter">OpenRouter (VL)</option>
            </select>
            
            <label>Model</label>
            <input type="text" id="model-input" value="llava" list="ollama-models">
            <datalist id="ollama-models"></datalist>
            
            <label id="apikey-label" style="display:none;">API Key</label>
            <input type="password" id="apikey-input" style="display:none;">
            
            <label class="toggle-container" style="display:flex; align-items:center; gap:8px; margin-top:15px; color:#a6adc8; font-size:12px;">
                <input type="checkbox" id="private-mode-toggle">
                <span class="toggle-label">Strict Private Mode</span>
            </label>
            
            <button id="save-settings-btn">Save Settings</button>
        </div>
        
        <div class="cron-section">
            <h3 style="color:#a6adc8; font-size:14px; margin-top:30px;">Active Jobs</h3>
            <div id="cron-list" style="font-size:12px; color:#cdd6f4;">No active jobs.</div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="chat-history" id="chat-history">
            <div class="message assistant">
                Hello! I am Agentic Desktop. I have VL capabilities and can use Set-of-Mark targeting. What can I do for you today?
            </div>
        </div>
        
        <div id="callback-modal" class="hidden">
            <div class="modal-content">
                <h3 id="callback-q"></h3>
                <input type="text" id="callback-input" placeholder="Type your response...">
                <button id="callback-submit">Submit</button>
            </div>
        </div>
        
        <div class="input-area">
            <div id="QueryBox">
                <div id="AttachmentsRow" class="hidden">
                    <div class="attachment-pill">
                        <i data-lucide="file-text" style="width:14px; height:14px;"></i>
                        <span>example.txt</span>
                    </div>
                </div>
                <textarea type="text" id="QueryField" placeholder="Ask anything, use @ to mention attachments"></textarea>
                <div id="ActionRow">
                    <button id="AddAttachments" class="Buttons">
                        <i data-lucide="plus"></i>
                    </button>
                    <button id="ModelSelector">
                        llava
                        <i data-lucide="chevrons-up-down" class="Buttons" style="margin-left: 4px;"></i>
                    </button>
                    
                    <div class="Tool" id="ModeTool">
                        <i data-lucide="square-terminal" class="Buttons"></i>
                        <span class="tool-name">Autonomous</span>
                        <i data-lucide="x" class="Buttons remove-tool"></i>
                    </div>
                    
                    <div style="flex:1;"></div> <!--spacer-->
                    <button id="SubmitQuery">
                        <i data-lucide="arrow-right" style="color: var(--bg);"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
